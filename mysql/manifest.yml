apiVersion: apps/v1
kind:  Deployment
metadata:
  name: mysql
  namespace: expense
  labels: # these are replicaset labels
    app: mysql
    tier: db
    project: expense
spec:
  replicas: 2
  selector:
    # these are used to select the pod to create replicas
    matchLabels:
      app: mysql
      tier: db
      project: expense
  template:
    metadata:
      # these labels belongs to pod
      labels:
        app: mysql
        tier: db
        project: expense
    spec:
      containers:
      - name: nginx
        image: bharath1106/mysql:v1
---
kind: Service
apiVersion: v1
metadata:
  name: nginx
spec:
  selector:
    tier: frontend
    app: nginx
  ports:
  - name: nginx-svc-port
    protocol: TCP
    port: 80 # service port
    targetPort: 80 # container port