apiVersion: v1
kind: ConfigMap
metadata:
  name: backend
  namespace: expense
data:
  DB_HOST: mysql
---
apiVersion: apps/v1
kind:  Deployment
metadata:
  name: backend
  namespace: expense
  labels: # these are replicaset labels
    app: backend
    tier: app
    project: expense
spec:
  replicas: 2
  selector:
    # these are used to select the pod to create replicas
    matchLabels:
      app: backend
      tier: app
      project: expense
  template:
    metadata:
      # these labels belongs to pod
      labels:
        app: backend
        tier: app
        project: expense
    spec:
      containers:
      - name: backend
        image: bharath1106/frontend:v1
        envFrom:
        - configMapRef:
            name: backend
---
kind: Service
apiVersion: v1
metadata:
  name: backend
  namespace: expense
spec:
  selector:
    app: backend
    tier: app
    project: expense
  ports:
  - name: app-port
    protocol: TCP
    port: 8080 # service port
    targetPort: 8080 # container port